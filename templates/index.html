<!DOCTYPE html>
<html>
<head>
    <title>TrackForMe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <a href="/dashboard" class="btn" style="background: var(--accent-alt);">View Dashboard</a>
        <h1>Track For Me</h1>
        <p>Track your product prices easily.</p>
        <form action="/track" method="POST">
            <input type="text" name="name" placeholder="Product Name" required>
            <input type="text" name="url" placeholder="Amazon Product URL" required>
            <input type="number" step="0.01" name="target_price" placeholder="Target Price" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <button type="submit">Start Tracking</button>
        </form>
    </div>
</body>
</html>
